<!DOCTYPE html>
<html>
<head>
    <title>UTS ASJ - Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 p-5 font-sans">
    <div id="delModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl text-center">
            <i class="fas fa-trash-can text-red-500 text-5xl mb-4"></i>
            <h3 class="text-xl font-bold text-gray-800 mb-2">Hapus Data?</h3>
            <p class="text-gray-500 mb-6">Apakah anda yakin ingin menghapus file ini?</p>
            <div class="flex gap-3">
                <button onclick="closeModal('delModal')" class="flex-1 py-2 bg-gray-200 text-gray-700 rounded-xl font-bold">No</button>
                <button id="confirmDelBtn" class="flex-1 py-2 bg-red-500 text-white rounded-xl font-bold">Yes</button>
            </div>
        </div>
    </div>

    <div id="errModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-[70] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl text-center">
            <i class="fas fa-circle-exclamation text-orange-500 text-5xl mb-4"></i>
            <h3 class="text-xl font-bold text-gray-800 mb-2">Opps!</h3>
            <p class="text-gray-500 mb-6">Email telah digunakan</p>
            <button onclick="closeModal('errModal')" class="w-full py-2 bg-orange-500 text-white rounded-xl font-bold">Mengerti</button>
        </div>
    </div>

    <div class="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-gray-100">
        <h1 id="title" class="text-2xl font-black mb-6 text-indigo-700 text-center uppercase">Upload Your Photo Here</h1>
        <form id="f" class="space-y-4 mb-10">
            <input type="hidden" id="userId">
            <input type="text" id="n" placeholder="Nama Lengkap" class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 outline-none" required>
            <input type="email" id="e" placeholder="email@domain.com" class="w-full border-2 p-3 rounded-xl focus:border-indigo-500 outline-none" required>
            <div class="border-2 border-dashed p-4 rounded-2xl bg-slate-50 text-center relative">
                <label class="cursor-pointer block">
                    <input type="file" id="p" class="hidden" accept="image/*" onchange="preview(event)">
                    <div class="flex justify-center">
                        <img id="pv" src="" class="hidden w-28 h-28 rounded-full object-cover border-4 border-white shadow-lg">
                        <div id="placeholder" class="w-28 h-28 rounded-full bg-gray-200 flex items-center justify-center text-gray-400">
                            <i class="fas fa-camera text-3xl"></i>
                        </div>
                    </div>
                </label>
            </div>
            <button id="btn" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black shadow-lg">SIMPAN DATA</button>
            <button type="button" id="cncl" class="hidden w-full bg-slate-400 text-white p-3 rounded-2xl font-bold mt-2" onclick="resetForm()">BATAL EDIT</button>
        </form>
        <div id="list" class="space-y-4"></div>
    </div>

    <script>
        const API = "http://" + window.location.hostname + ":8080/users";
        let deleteId = null;

        function preview(event) {
            const reader = new FileReader();
            reader.onload = () => {
                const img = document.getElementById('pv');
                img.src = reader.result;
                img.classList.remove('hidden');
                document.getElementById('placeholder').classList.add('hidden');
            };
            if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
        }

        async function load() {
            const r = await fetch(API);
            const data = await r.json();
            document.getElementById('list').innerHTML = data.map(u => `
                <div class="flex items-center justify-between p-4 border-2 border-gray-50 rounded-2xl bg-white shadow-sm hover:border-indigo-100 transition">
                    <div class="flex items-center gap-4">
                        <img src="${u.photoUrl}" class="w-14 h-14 rounded-full object-cover border-2 border-white shadow-md">
                        <div>
                            <p class="font-black text-gray-800">${u.name}</p>
                            <p class="text-xs text-gray-400 font-medium">${u.email}</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick='editUser(${JSON.stringify(u)})' class="p-2 bg-indigo-50 text-indigo-600 rounded-lg"><i class="fas fa-edit"></i></button>
                        <button onclick="askDelete(${u.id})" class="p-2 bg-red-50 text-red-500 rounded-lg"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('f').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const fd = new FormData();
            fd.append('name', document.getElementById('n').value);
            fd.append('email', document.getElementById('e').value);
            if(document.getElementById('p').files[0]) fd.append('photo', document.getElementById('p').files[0]);
            const res = await fetch(id ? API + "/" + id : API, { method: id ? 'PUT' : 'POST', body: fd });
            if(res.ok) { resetForm(); load(); } else { document.getElementById('errModal').classList.remove('hidden'); }
        };

        function askDelete(id) { deleteId = id; document.getElementById('delModal').classList.remove('hidden'); }
        document.getElementById('confirmDelBtn').onclick = async () => {
            await fetch(API + "/" + deleteId, { method: 'DELETE' });
            closeModal('delModal');
            load();
        };

        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
        function editUser(u) {
            document.getElementById('userId').value = u.id;
            document.getElementById('n').value = u.name;
            document.getElementById('e').value = u.email;
            document.getElementById('btn').innerText = "UPDATE SEKARANG";
            document.getElementById('btn').className = "w-full bg-emerald-500 text-white p-4 rounded-2xl font-black";
            document.getElementById('cncl').classList.remove('hidden');
            document.getElementById('pv').src = u.photoUrl;
            document.getElementById('pv').classList.remove('hidden');
            document.getElementById('placeholder').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('f').reset();
            document.getElementById('userId').value = '';
            document.getElementById('btn').innerText = "SIMPAN DATA";
            document.getElementById('btn').className = "w-full bg-indigo-600 text-white p-4 rounded-2xl font-black";
            document.getElementById('cncl').classList.add('hidden');
            document.getElementById('pv').classList.add('hidden');
            document.getElementById('placeholder').classList.remove('hidden');
        }
        load();
    </script>
</body>
</html>
